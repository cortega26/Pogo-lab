# Guardrails de higiene ACTIVOS HOY (fase de documentación).
# Los hooks de CÓDIGO (Ruff, mypy, import-linter, pytest) se añaden en M1 junto con el
# código, donde corren en verde — ver CONTRIBUTING.md § Tooling y guardrails.
#
# Instalar:  pre-commit install && pre-commit install --hook-type commit-msg
# Fijar versiones actuales:  pre-commit autoupdate   (los `rev` de abajo son un punto de partida)
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.jsonc"]

  # Mensajes de commit en Conventional Commits (stage commit-msg).
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
