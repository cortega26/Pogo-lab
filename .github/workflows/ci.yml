name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYNC_GROUP: dev
  DJANGO_SETTINGS_MODULE: config.settings.test
  SECRET_KEY: ci-test-key-not-for-production
  DATABASE_URL: sqlite:///db.sqlite3

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy typecheck
        run: uv run mypy config engine apps tests

      - name: Import linter
        run: uv run lint-imports

      - name: Migration check
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: uv run python manage.py check --deploy

      # test_e2e.py se excluye aquí: este job no instala Chromium; el job `e2e`
      # de abajo sí lo hace y corre esos tests por separado.
      - name: Tests + coverage
        run: |
          uv run coverage run -m pytest --no-header -q --tb=short --ignore=tests/test_e2e.py
          uv run coverage report

      - name: Security audit
        run: uv run pip-audit

  test-postgres:
    needs: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pogo
          POSTGRES_PASSWORD: pogo
          POSTGRES_DB: pogo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pogo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run migrations on PostgreSQL
        run: uv run python manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://pogo:pogo@localhost:5432/pogo_test

      - name: PostgreSQL-gated tests
        run: uv run pytest -m postgres --no-header -q --tb=short
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres
          DATABASE_URL: postgres://pogo:pogo@localhost:5432/pogo_test

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Playwright
        run: uv run playwright install chromium --with-deps

      - name: E2E tests
        run: uv run pytest tests/test_e2e.py -v --no-header --tb=long
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-e2e-test-key
          DATABASE_URL: sqlite:///db.sqlite3
