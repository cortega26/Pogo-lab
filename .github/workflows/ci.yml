name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYNC_GROUP: dev
  DJANGO_SETTINGS_MODULE: config.settings.test
  SECRET_KEY: ci-test-key-not-for-production
  DATABASE_URL: sqlite:///db.sqlite3

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy typecheck
        run: uv run mypy config engine apps

      - name: Import linter
        run: uv run lint-imports

      - name: Migration check
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: uv run python manage.py check --deploy

      - name: Tests
        run: uv run pytest --no-header -q --tb=short

      - name: Coverage
        run: uv run coverage run -m pytest && uv run coverage report
