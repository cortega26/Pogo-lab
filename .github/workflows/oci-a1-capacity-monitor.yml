name: Monitor de capacidad OCI A1

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: oci-a1-capacity-monitor
  cancel-in-progress: false

jobs:
  check-capacity:
    runs-on: ubuntu-latest
    env:
      OCI_A1_OCPUS: "2"
      OCI_A1_MEMORY_GB: "12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Instalar SDK de OCI
        run: python -m pip install --disable-pip-version-check "oci==2.182.1"

      - name: Preparar clave API de OCI
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          umask 077
          key_path="$RUNNER_TEMP/oci_api_key.pem"
          printf '%s' "$OCI_PRIVATE_KEY" > "$key_path"
          echo "OCI_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Consultar capacidad A1
        id: capacity
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
        run: python bin/check_oci_a1_capacity.py

      - name: Crear o cerrar alerta de GitHub
        id: alert
        uses: actions/github-script@v7
        env:
          CAPACITY_STATUS: ${{ steps.capacity.outputs.status }}
          AVAILABLE_FAULT_DOMAINS: ${{ steps.capacity.outputs.available_fault_domains }}
          OCI_A1_OCPUS: ${{ env.OCI_A1_OCPUS }}
          OCI_A1_MEMORY_GB: ${{ env.OCI_A1_MEMORY_GB }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        with:
          script: |
            const title = "[OCI] Capacidad A1 Always Free disponible";
            const status = process.env.CAPACITY_STATUS;
            const dimensions = `${process.env.OCI_A1_OCPUS} OCPU / ${process.env.OCI_A1_MEMORY_GB} GB`;
            const { owner, repo } = context.repo;
            const { data: openItems } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const alerts = openItems.filter(
              (item) => !item.pull_request && item.title === title,
            );

            if (status === "available") {
              if (alerts.length === 0) {
                const body = [
                  "OCI informó capacidad para `VM.Standard.A1.Flex`.",
                  "",
                  `- Configuración consultada: **${dimensions}**`,
                  `- Región: **${process.env.OCI_REGION}**`,
                  `- Fault domains: **${process.env.AVAILABLE_FAULT_DOMAINS}**`,
                  "",
                  "No se creó ninguna instancia. La capacidad puede desaparecer antes del aprovisionamiento.",
                  "La configuración consultada coincide con la asignación Always Free vigente. No se crearon recursos.",
                ].join("\n");
                await github.rest.issues.create({ owner, repo, title, body });
                core.setOutput("new_availability", "true");
              } else {
                core.setOutput("new_availability", "false");
              }
              return;
            }

            for (const alert of alerts) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: alert.number,
                state: "closed",
              });
            }
            core.setOutput("new_availability", "false");

      - name: Enviar webhook opcional
        if: steps.alert.outputs.new_availability == 'true' && env.OCI_CAPACITY_WEBHOOK_URL != ''
        env:
          OCI_CAPACITY_WEBHOOK_URL: ${{ secrets.OCI_CAPACITY_WEBHOOK_URL }}
          AVAILABLE_FAULT_DOMAINS: ${{ steps.capacity.outputs.available_fault_domains }}
          OCI_A1_OCPUS: ${{ env.OCI_A1_OCPUS }}
          OCI_A1_MEMORY_GB: ${{ env.OCI_A1_MEMORY_GB }}
        run: |
          payload=$(jq -nc \
            --arg message "OCI A1 tiene capacidad para $OCI_A1_OCPUS OCPU / $OCI_A1_MEMORY_GB GB en $AVAILABLE_FAULT_DOMAINS. Revisa el issue de GitHub creado por el monitor." \
            '{content: $message, text: $message}')
          curl --fail --silent --show-error --max-time 15 --retry 2 \
            --user-agent "Pogo-lab-OCI-monitor/1.0" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "$OCI_CAPACITY_WEBHOOK_URL"
