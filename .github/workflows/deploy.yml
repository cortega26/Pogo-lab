name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy-oci:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="/home/ubuntu/.local/bin:$PATH"
            cd /opt/pogo-lab
            git fetch origin main
            git stash --include-untracked || true
            git checkout main
            git reset --hard origin/main
            git stash drop 2>/dev/null || true
            uv sync --frozen --no-dev
            uv run python manage.py check --deploy
            uv run python manage.py migrate --noinput
            uv run python manage.py collectstatic --noinput
            sudo systemctl restart pogo-lab.service
            curl --fail --silent --show-error --retry 5 \
              --retry-connrefused --header "Host: ${{ secrets.OCI_HOST }}" \
              http://127.0.0.1:8000/healthcheck.json
            echo "Despliegue completado en $(date -Iseconds)"

# Setup inicial en OCI (una sola vez):
# 1. Crear una VM ARM Ampere A1 dentro del límite Always Free vigente
#    (2 OCPU, 12 GB). Una configuración de 4 OCPU / 24 GB excede ese límite
#    y puede facturarse bajo PAYG:
#    https://cloud.oracle.com/compute/instances
# 2. Instalar Python 3.13, uv, PostgreSQL y nginx en la VM.
# 3. Clonar el repo: git clone <repo-url> /opt/pogo-lab
# 4. Crear .env y configurar el servicio systemd `pogo-lab.service`.
# 5. Configurar secretos en GitHub (Settings > Secrets and variables > Actions):
#    - OCI_HOST: IP pública de la VM
#    - OCI_USER: usuario SSH (ubuntu en Oracle Linux)
#    - OCI_SSH_KEY: clave privada SSH (~/.ssh/id_rsa sin passphrase o deploy key)
# 6. Habilitar `pogo-lab.service` y verificar `/healthcheck.json` localmente.
# 7. Configurar DNS (A record) apuntando al dominio.
# 8. Ejecutar `sudo ./bin/install-backup-timer.sh`.
# 9. Opcional: configurar firewall de OCI (puertos 80/443 abiertos).
