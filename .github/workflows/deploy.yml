name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"

jobs:
  deploy-oci:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd /opt/pogo-lab
            git pull origin main
            docker compose -f compose.prod.yaml up -d --build --remove-orphans
            docker compose -f compose.prod.yaml exec -T web python manage.py migrate --noinput
            docker compose -f compose.prod.yaml exec -T web python manage.py collectstatic --noinput
            docker system prune -f
            echo "Despliegue completado en $(date -Iseconds)"

# Setup inicial en OCI (una sola vez):
# 1. Crear VM ARM Ampere A1 (4 OCPU, 24 GB) en la capa gratuita de OCI:
#    https://cloud.oracle.com/compute/instances
# 2. Instalar Docker + Docker Compose en la VM:
#    curl -fsSL https://get.docker.com | sh
#    sudo usermod -aG docker $USER
# 3. Clonar el repo: git clone <repo-url> /opt/pogo-lab
# 4. Crear .env.prod a partir de .env.prod.example y configurar valores reales.
# 5. Configurar secretos en GitHub (Settings > Secrets and variables > Actions):
#    - OCI_HOST: IP pública de la VM
#    - OCI_USER: usuario SSH (ubuntu en Oracle Linux)
#    - OCI_SSH_KEY: clave privada SSH (~/.ssh/id_rsa sin passphrase o deploy key)
# 6. Ejecutar docker compose -f compose.prod.yaml up -d --build la primera vez.
# 7. Configurar DNS (A record) apuntando al dominio.
# 8. Configurar backup automático vía cron/systemd timer con bin/backup.sh.
# 9. Opcional: configurar firewall de OCI (puertos 80/443 abiertos).
