{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Exportar datos" %} — Pogo-lab{% endblock %}

{% block content %}
<div class="mx-auto mt-8 max-w-md">
  <h1 class="section-title text-center">{% trans "Exportar datos" %}</h1>
  <form method="post" class="specimen-card p-6">
    {% csrf_token %}
    <p class="mb-6 text-sm text-slate-600 dark:text-slate-400">
      {% trans "Recibirás un enlace de descarga con todos tus datos personales (GDPR Art. 20)." %}
    </p>
    <button type="submit" class="btn-bracket w-full bg-brand-500 text-white hover:bg-brand-600">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
      </svg>
      {% trans "Solicitar exportación" %}
    </button>
  </form>
</div>
{% endblock %}
