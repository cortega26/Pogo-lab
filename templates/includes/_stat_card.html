{% load i18n %}
<div class="specimen-card p-6 text-center">
  <p class="font-display text-4xl font-black {% if color == 'brand' %}text-brand-500{% elif color == 'accent' %}text-accent-500{% elif color == 'lucky' %}text-lucky-500{% elif color == 'hundo' %}text-hundo-500{% elif color == 'danger' %}text-danger-500{% else %}text-slate-800 dark:text-slate-100{% endif %}">
    {{ value }}
  </p>
  <p class="mt-2 font-mono text-[11px] font-medium tracking-wide uppercase text-slate-500 dark:text-slate-400">{{ label }}</p>
</div>
