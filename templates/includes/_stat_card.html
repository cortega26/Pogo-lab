{% load i18n %}
<div class="rounded-xl border border-slate-200 bg-white p-6 text-center shadow-card transition-all duration-200 dark:border-slate-800 dark:bg-slate-900">
  <p class="text-3xl font-bold {% if color == 'brand' %}text-brand-500{% elif color == 'accent' %}text-accent-500{% elif color == 'lucky' %}text-lucky-500{% elif color == 'hundo' %}text-hundo-500{% elif color == 'danger' %}text-danger-500{% else %}text-slate-800 dark:text-slate-100{% endif %}">
    {{ value }}
  </p>
  <p class="mt-1 text-xs font-medium tracking-wide uppercase text-slate-500 dark:text-slate-400">{{ label }}</p>
</div>
