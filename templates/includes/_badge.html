<span class="inline-flex items-center gap-1 border px-2 py-0.5 font-mono text-[11px] font-semibold uppercase tracking-wide
  {% if variant == 'accent' %}border-accent-500 text-accent-600 dark:text-accent-400
  {% elif variant == 'lucky' %}border-lucky-500 text-lucky-600 dark:text-lucky-400
  {% elif variant == 'hundo' %}border-hundo-500 text-hundo-600 dark:text-hundo-400
  {% elif variant == 'danger' %}border-danger-500 text-danger-600 dark:text-danger-400
  {% elif variant == 'secondary' %}border-secondary-500 text-secondary-600 dark:text-secondary-500
  {% else %}border-brand-500 text-brand-600 dark:text-brand-400{% endif %}">
  {{ label }}
</span>
