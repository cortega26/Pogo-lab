# ─────────────────────────────────────────────────────────────
# Pogo-lab — Despliegue en VM diminuta (1 GB RAM)
#
# Diferencias con compose.prod.yaml:
#   - SIN contenedor `db`: Postgres se externaliza a un servicio
#     gestionado gratuito (Neon o Supabase). Libera ~250-400 MB de RAM
#     y elimina el componente más pesado de la instancia.
#   - gunicorn baja de 3 → 2 workers (memoria ajustada).
#
# Requisitos en la VM:
#   1. Ejecutar `sudo ./bin/setup-swap.sh` (swap imprescindible en 1 GB).
#   2. En .env.prod definir DATABASE_URL apuntando al Postgres externo, p. ej.:
#        DATABASE_URL=postgres://USER:PASS@HOST/DB?sslmode=require
#      (Neon y Supabase exigen SSL → no omitas ?sslmode=require)
#
# Uso:
#   docker compose -f compose.micro.yaml up -d --build
# ─────────────────────────────────────────────────────────────
services:
  web:
    build: .
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      # DATABASE_URL NO se define aquí: proviene de .env.prod y apunta
      # al Postgres externo (Neon/Supabase) con ?sslmode=require.
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --access-logfile -"

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
