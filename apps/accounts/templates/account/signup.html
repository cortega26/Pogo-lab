{% extends "base.html" %}
{% load i18n allauth account %}

{% block title %}{% trans "Registrarse" %} — Pogo-lab{% endblock %}

{% block content %}
<div class="mx-auto mt-8 max-w-md">
  <h1 class="section-title text-center">{% trans "Registrarse" %}</h1>

  <form method="post" action="{% url 'account_signup' %}" class="card p-6 space-y-5">
    {% csrf_token %}

    {{ form }}

    <button type="submit"
            class="w-full inline-flex items-center justify-center gap-2 rounded-lg px-5 py-2.5 text-sm font-semibold transition-all duration-150 bg-brand-500 text-white hover:bg-brand-600 active:scale-[0.97] focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 focus-visible:ring-offset-2">
      {% trans "Registrarse" %}
    </button>
  </form>

  <p class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
    {% trans "¿Ya tienes cuenta?" %}
    <a href="{% url 'account_login' %}" class="ml-1 font-medium text-brand-500 transition-colors hover:text-brand-600 dark:text-brand-400">
      {% trans "Iniciar sesión" %}
    </a>
  </p>
</div>
{% endblock %}
