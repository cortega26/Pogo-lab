{% extends "base.html" %}
{% load i18n allauth account %}

{% block title %}{% trans "Registrarse" %} — Pogo-lab{% endblock %}

{% block content %}
<div class="mx-auto mt-12 max-w-md rounded border bg-white p-6 shadow">
  <h1 class="mb-6 text-2xl font-bold text-gray-900">{% trans "Registrarse" %}</h1>

  <form method="post" action="{% url 'account_signup' %}" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit"
            class="w-full rounded bg-blue-600 px-4 py-2 font-bold text-white hover:bg-blue-700">
      {% trans "Registrarse" %}
    </button>
  </form>

  <p class="mt-4 text-center text-sm text-gray-600">
    {% trans "¿Ya tienes cuenta?" %}
    <a href="{% url 'account_login' %}" class="text-blue-600 hover:underline">
      {% trans "Iniciar sesión" %}
    </a>
  </p>
</div>
{% endblock %}
