{% load i18n %}
<div class="mb-6">
  <h2 class="mb-4 text-lg font-semibold text-slate-700 dark:text-slate-300">
    {% trans "Tipos de ataque" %}
  </h2>
  <div class="grid grid-cols-3 gap-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-9">
    {% for t in type_stats %}
    <a href="{% url 'dps_by_type' tipo=t.key %}"
       data-type-link
       class="group relative flex flex-col items-center gap-1 rounded-xl p-3 text-center text-xs font-semibold text-white transition-all duration-150 hover:-translate-y-0.5 hover:shadow-lg {% if attack_type == t.key %}ring-2 ring-white ring-offset-2 ring-offset-slate-900 shadow-lg{% endif %}"
       style="background-color: {{ t.color }};"
       aria-label="{{ t.name }}">
      <span class="text-sm leading-none">{{ t.name }}</span>
      <span class="text-[10px] font-normal opacity-80">{{ t.count }} {% trans "esp." %}</span>
    </a>
    {% endfor %}
  </div>
</div>
