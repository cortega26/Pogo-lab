{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Nueva sesión — Pogo-lab" %}{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
  <nav class="mb-6 flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
    <a href="{% url 'trades:session_list' %}" class="transition-colors hover:text-brand-500 dark:hover:text-brand-400">{% trans "Sesiones" %}</a>
    <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
    <span class="font-medium text-slate-700 dark:text-slate-300">{% trans "Nueva" %}</span>
  </nav>

  <h1 class="section-title">{% trans "Nueva sesión de intercambios" %}</h1>

  <form method="post" class="card p-6">
    {% csrf_token %}

    <div class="mb-5">
      <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300" for="label">
        {% trans "Etiqueta (opcional)" %}
      </label>
      <input type="text" name="label" id="label" maxlength="255"
             class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm placeholder-slate-400 transition-colors duration-150 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-brand-400"
             placeholder="{% trans 'Ej: Sesión con Juan' %}">
    </div>

    <div class="mb-5">
      <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300" for="default_friendship">
        {% trans "Amistad por defecto" %}
      </label>
      <select name="default_friendship" id="default_friendship"
              class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm placeholder-slate-400 transition-colors duration-150 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-brand-400">
        <option value="good">{% trans "Good Friends" %}</option>
        <option value="great">{% trans "Great Friends" %}</option>
        <option value="ultra">{% trans "Ultra Friends" %}</option>
        <option value="best">{% trans "Best Friends" %}</option>
      </select>
    </div>

    <div class="mb-6">
      <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300" for="default_trade_type">
        {% trans "Tipo de intercambio por defecto" %}
      </label>
      <select name="default_trade_type" id="default_trade_type"
              class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm placeholder-slate-400 transition-colors duration-150 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-brand-400">
        <option value="normal">{% trans "Normal" %}</option>
        <option value="lucky">{% trans "Lucky" %}</option>
        <option value="lucky_guaranteed">{% trans "Lucky garantizado" %}</option>
      </select>
    </div>

    <div class="flex items-center gap-3">
      <button type="submit"
              class="inline-flex items-center justify-center gap-2 rounded-lg px-5 py-2.5 text-sm font-semibold transition-all duration-150 bg-brand-500 text-white hover:bg-brand-600 active:scale-[0.97] focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 focus-visible:ring-offset-2">
        {% trans "Crear sesión" %}
      </button>
      <a href="{% url 'trades:session_list' %}"
         class="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-semibold transition-all duration-150 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">
        {% trans "Cancelar" %}
      </a>
    </div>
  </form>
</div>
{% endblock %}
