{% load i18n %}
<a href="{% url 'trades:session_detail' session.id %}"
   class="specimen-card block p-5">
  <div class="flex items-center justify-between">
    <div>
      <h3 class="text-base font-semibold text-slate-800 dark:text-slate-100">
        {{ session.label|default:session.started_at|date:"Y-m-d H:i" }}
      </h3>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
        {{ session.get_default_friendship_display }}
        &middot; {{ session.get_default_trade_type_display }}
      </p>
    </div>
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center gap-1 border border-brand-500 px-2 py-0.5 font-mono text-[11px] font-semibold uppercase tracking-wide text-brand-600 dark:text-brand-400">
        {{ session.observation_count }} obs.
      </span>
      <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
      </svg>
    </div>
  </div>
</a>
