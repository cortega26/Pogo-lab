{% load i18n %}
<div class="border-2 border-slate-200 bg-white p-3 text-sm dark:border-slate-800 dark:bg-slate-900">
  <span class="font-mono">{{ obs.atk }}/{{ obs.iv_def }}/{{ obs.hp }}</span>
  &middot; {{ obs.get_friendship_level_display }}
  &middot; {{ obs.get_trade_type_display }}
  {% if obs.species %}&middot; {{ obs.species }}{% endif %}
  <span class="ml-2 inline-flex items-center border px-1.5 py-0.5 font-mono text-[11px] uppercase tracking-wide
    {% if obs.state == 'valid' %}border-hundo-500 text-hundo-600 dark:text-hundo-400
    {% elif obs.state == 'suspicious' %}border-secondary-500 text-secondary-600 dark:text-secondary-400
    {% elif obs.state == 'excluded' %}border-danger-500 text-danger-600 dark:text-danger-400
    {% else %}border-slate-400 text-slate-500 dark:text-slate-400{% endif %}">
    {{ obs.get_state_display }}
  </span>
</div>
