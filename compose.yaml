services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pogo
      POSTGRES_PASSWORD: pogo
      POSTGRES_DB: pogo
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pogo -d pogo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
